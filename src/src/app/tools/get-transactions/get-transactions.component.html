<div class="card bg-dark">
    <h5 class="card-header bg-dark">Get Transactions from Addresses</h5>
    <div class="card-body">
      <p class="card-text">
          Enter public addresses below to get the last transactions (one address per line)
      </p>
      <p class="card-text">
        <textarea class="form-control font-code" rows="12" [(ngModel)]="addresses"></textarea><br />

        <!-- Number of Transactions: <br />
        <input type="text" class="form-control" [(ngModel)]="delimiter"> -->
    </p>
    <p class="card-text">
      <button (click)="getTransactions()" class="btn" >Get Transactions</button>
    </p>
    <p class="card-text">
        <textarea class="form-control font-code" rows="12" disabled>{{transactions}}</textarea>
       </p> 
    </div>
  </div>
